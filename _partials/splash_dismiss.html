<script>
  // Splash teardown. Triggers on DOMContentLoaded (not window.load) so the
  // overlay drops as soon as the parsed DOM is ready — independent of the
  // hero <video>/<img> resources, which previously delayed the load event
  // past LCP on slow connections. Per-session: first visit shows the
  // animation, repeats remove the splash node immediately.
  (function () {
    var s = document.getElementById('splash');
    if (!s) return;
    try {
      if (sessionStorage.getItem('jsa_splash')) { s.remove(); return; }
      sessionStorage.setItem('jsa_splash', '1');
    } catch (e) {}
    var prev = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
    function dismiss() {
      s.classList.add('is-out');
      setTimeout(function () {
        if (s.parentNode) s.parentNode.removeChild(s);
        document.body.style.overflow = prev;
      }, 600);
    }
    var delay = (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) ? 400 : 150;
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function () { setTimeout(dismiss, delay); });
    } else {
      setTimeout(dismiss, delay);
    }
  })();
</script>
