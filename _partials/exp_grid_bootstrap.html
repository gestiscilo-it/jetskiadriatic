<script>
  // Two-phase product-card bootstrap for sub-pages and the home category strips:
  //
  //  PHASE 1 (per-category fill) — for any <section data-active-tab="X">
  //    containing an .exp-grid, empty the grid and render up to N skeleton
  //    cards (default 3, override via data-max on the grid) from the product
  //    catalogue filtered by `metadata.tab === X`. The skeletons carry
  //    data-product-id={slug}; Phase 2 then enriches them in place.
  //
  //  PHASE 2 (slug-based enrichment) — for ALL <article class="exp"
  //    data-product-id="..."> on the page (whether dynamically generated in
  //    Phase 1 or hand-authored on sub-pages like noleggio.html), populate
  //    images, tags, prices, titles, leads from the matching product.
  //
  // Robustness traits worth preserving:
  //   * Deferred to DOMContentLoaded so embed/v1.js (loaded later in the
  //     document) has had a chance to attach window.Gestiscilo. Inline
  //     parse-time execution silently no-ops when the SDK isn't ready yet.
  //   * Slug lookup tries top-level p.slug first (the first-class column
  //     post-migration 108), then falls back to metadata.jsa_id / slug /
  //     detail_key for legacy compatibility.
  (function () {
    var DEFAULT_MAX = 3;

    function bootstrap() {
      if (!window.Gestiscilo || !Gestiscilo.ready) return;
      // Phase 186: Gestiscilo.autoWire() auto-starts on ready and re-wires on DOM
      // mutations; manual wirePhoneLinks/wireEmailLinks are no longer needed here.
      Gestiscilo.ready
        .then(function () {
          return Gestiscilo.products();
        })
        .then(function (rows) {
          if (!Array.isArray(rows) || rows.length === 0) return;

          fillCategoryGrids(rows);
          enrichCards(rows);
        })
        .catch(function () { /* SDK bootstrap failed — empty wrappers stay (graceful degradation) */ });
    }

    // PHASE 1: replace hardcoded grid contents with N filtered skeleton cards.
    //
    // Two fill targets:
    //  (a) home rails — .flagship-overview[data-active-tab] sections (capped,
    //      default 3 via data-max);
    //  (b) sub-page catalogues — any .exp-grid[data-fill-tab] (uncapped by
    //      default: the page IS the category, so it lists the full filtered
    //      set; hardcoded cards inside are SSR fallback, replaced on fill).
    // Card accents need no per-card class: .exp reads var(--tab-accent),
    // scoped by body[data-active-tab] on sub-pages and by the section's own
    // data-active-tab attribute on the home rails.
    function fillCategoryGrids(rows) {
      var targets = [];
      document.querySelectorAll('.flagship-overview[data-active-tab]').forEach(function (section) {
        var grid = section.querySelector('.exp-grid');
        if (!grid) return;
        targets.push({ grid: grid, tab: section.getAttribute('data-active-tab'), defMax: DEFAULT_MAX });
      });
      document.querySelectorAll('.exp-grid[data-fill-tab]').forEach(function (grid) {
        targets.push({ grid: grid, tab: grid.getAttribute('data-fill-tab'), defMax: Infinity });
      });
      targets.forEach(function (t) {
        var grid = t.grid;
        var tab = t.tab;
        var max = parseInt(grid.getAttribute('data-max') || '', 10) || t.defMax;

        var filtered = rows
          .filter(function (p) { return p && p.metadata && p.metadata.tab === tab; })
          .sort(function (a, b) {
            // sort_order ascending (nulls last), then by slug for stable ties
            var sa = (a.sort_order != null) ? a.sort_order : Infinity;
            var sb = (b.sort_order != null) ? b.sort_order : Infinity;
            if (sa !== sb) return sa - sb;
            return String(a.slug || a.id).localeCompare(String(b.slug || b.id));
          })
          .slice(0, max);

        if (filtered.length === 0) return;

        grid.innerHTML = filtered.map(function (p, i) {
          var slug = String(p.slug || (p.metadata && p.metadata.slug) || p.id);
          var safeSlug = slug.replace(/"/g, '&quot;');
          var nn = String(i + 1).padStart(2, '0');
          var titleFallback = p.name || '';
          return '' +
            '<article class="exp" data-detail="' + safeSlug + '" data-product-id="' + safeSlug + '">' +
              '<div class="exp-n">' + nn + '</div>' +
              '<div class="exp-illu"></div>' +
              '<h3>' + escapeText(titleFallback) + '</h3>' +
              '<p></p>' +
              '<ul class="exp-tags"></ul>' +
              '<div class="exp-foot">' +
                '<div class="exp-price"><b></b><span></span></div>' +
                '<span class="exp-go">Scopri <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg></span>' +
              '</div>' +
            '</article>';
        }).join('');
        // Column balancing: 4 or 8 cards read better as 4-up rows than 3+1 /
        // 3+3+2 orphans. CSS keys on data-count (≥1100px only).
        grid.setAttribute('data-count', String(filtered.length));
      });
    }

    // PHASE 2: enrich every .exp[data-product-id] (hardcoded or dynamic).
    function enrichCards(rows) {
      rows.forEach(function (p) {
        var meta = p.metadata || {};
        var img = (p.media && p.media.length) ? p.media[0].url : (meta.img || '');
        var tags = meta.tags || [];
        var basePrice = (p.price_cents || 0) / 100;
        var priceUnit = meta.priceUnit || '';
        var pidNum = String(p.id);
        var pidSlug = String(p.slug || meta.slug || '');
        var pidDetail = String(meta.detail_key || '');
        var pidJsaId = String(meta.jsa_id || '');
        var article = document.querySelector(
          'article.exp[data-product-id="' + pidNum + '"], ' +
          'article.exp[data-product-id="' + pidSlug + '"], ' +
          'article.exp[data-product-id="' + pidJsaId + '"], ' +
          'article.exp[data-product-id="' + pidDetail + '"]'
        );
        if (!article) return;
        var illu = article.querySelector('.exp-illu');
        if (illu) illu.style.backgroundImage = img ? "url('" + img + "')" : '';
        var tagsEl = article.querySelector('.exp-tags');
        if (tagsEl) {
          tagsEl.innerHTML = '';
          tags.forEach(function (t) {
            var li = document.createElement('li');
            li.textContent = t;
            tagsEl.appendChild(li);
          });
        }
        var priceB = article.querySelector('.exp-price b');
        var priceSpan = article.querySelector('.exp-price span');
        if (priceB) priceB.textContent = 'da ' + basePrice + '€';
        if (priceSpan) priceSpan.textContent = priceUnit;
        // Title + lead overrides from metadata (operator-authored, allows
        // <em>/<b> markup in title for italic accents). The static HTML
        // values stay as fallback when metadata is absent.
        var h3El = article.querySelector('h3');
        if (h3El && meta.title) h3El.innerHTML = meta.title;
        var pEl = article.querySelector('p');
        if (pEl && meta.lead) pEl.textContent = meta.lead;
      });
    }

    function escapeText(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', bootstrap);
    } else {
      bootstrap();
    }

    // 166 D-01: navigate to index.html booking flow when an exp card is clicked.
    // Listener attaches once even before bootstrap — closest() works regardless.
    document.addEventListener('click', function (ev) {
      var trigger = ev.target.closest('[data-detail]');
      if (!trigger) return;
      var id = trigger.getAttribute('data-detail');
      if (!id) return;
      ev.preventDefault();
      location.href = 'index.html#p=' + encodeURIComponent(id);
    });
  })();
</script>
