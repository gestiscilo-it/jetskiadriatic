<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amaris Experience</title>
  <meta name="description" content="Esperienze in moto d'acqua sulla costa del Monte Conero. Noleggio, tour guidati e tramonti romantici in mare.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@400;500&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #0a0a0a;
      -webkit-font-smoothing: antialiased;
    }

    /* Floating Logo Header */
    .logo-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 2rem;
      pointer-events: none;
      animation: fadeDown 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .logo-star {
      width: 24px;
      height: 24px;
      opacity: 0.9;
    }

    .logo-star svg {
      width: 100%;
      height: 100%;
      fill: none;
      stroke: #d4c5a9;
      stroke-width: 1.5;
    }

    .logo-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.875rem;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #f5f5f3;
      opacity: 0.9;
    }

    .logo-tagline {
      font-family: 'Inter', sans-serif;
      font-size: 0.5625rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #888;
      margin-top: 0.25rem;
    }

    /* Panel Container */
    .panels {
      display: flex;
      height: 100vh;
      width: 100%;
    }

    .panel {
      flex: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      transition: flex 0.7s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
    }

    .panel:hover,
    .panel.expanded {
      flex: 1.6;
    }

    /* Video Background */
    .panel-video {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .panel-video video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.1);
      transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .panel:hover .panel-video video,
    .panel.expanded .panel-video video {
      transform: scale(1.15);
    }

    /* Dark Cover Overlay */
    .panel-cover {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .panel:hover .panel-cover,
    .panel.expanded .panel-cover {
      opacity: 0.25;
    }

    /* Color tint overlay */
    .panel-tint {
      position: absolute;
      inset: 0;
      opacity: 0.4;
      mix-blend-mode: multiply;
      transition: opacity 0.6s ease;
    }

    .panel:hover .panel-tint,
    .panel.expanded .panel-tint {
      opacity: 0.15;
    }

    /* Panel Content */
    .panel-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .panel:nth-child(1) .panel-content { animation-delay: 0.3s; }
    .panel:nth-child(2) .panel-content { animation-delay: 0.5s; }
    .panel:nth-child(3) .panel-content { animation-delay: 0.7s; }

    .panel-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 2rem;
      opacity: 0.4;
      transition: all 0.5s ease;
    }

    .panel:hover .panel-icon,
    .panel.expanded .panel-icon {
      opacity: 0.8;
      transform: scale(1.1);
    }

    .panel-icon svg {
      width: 100%;
      height: 100%;
      fill: none;
      stroke: currentColor;
      stroke-width: 1;
    }

    .panel-name {
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 300;
      margin-bottom: 0.75rem;
      letter-spacing: 0.1em;
      transition: all 0.5s ease;
    }

    .panel:hover .panel-name,
    .panel.expanded .panel-name {
      letter-spacing: 0.15em;
    }

    .panel-tagline {
      font-size: 0.6875rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.4;
      margin-bottom: 2.5rem;
      transition: opacity 0.5s ease;
    }

    .panel:hover .panel-tagline,
    .panel.expanded .panel-tagline {
      opacity: 0.7;
    }

    .panel-cta {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.625rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 1rem 2rem;
      border: 1px solid currentColor;
      opacity: 0;
      transform: translateY(15px);
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .panel:hover .panel-cta,
    .panel.expanded .panel-cta {
      opacity: 0.6;
      transform: translateY(0);
    }

    .panel .panel-cta:hover {
      opacity: 1;
      background: currentColor;
    }

    .panel-cta-arrow {
      width: 16px;
      height: 16px;
      transition: transform 0.3s ease;
    }

    .panel .panel-cta:hover .panel-cta-arrow {
      transform: translateX(4px);
    }

    /* Vertical Dividers */
    .panel-divider {
      position: absolute;
      top: 20%;
      bottom: 20%;
      width: 1px;
      opacity: 0.1;
      transition: opacity 0.5s ease;
    }

    .panel:hover .panel-divider,
    .panel.expanded .panel-divider {
      opacity: 0.2;
    }

    /* ==================== LITE ==================== */
    .panel-lite {
      background: #1a1a1a;
      color: #f5f5f3;
      font-family: 'DM Sans', sans-serif;
    }

    .panel-lite .panel-tint {
      background: #b14028;
    }

    .panel-lite .panel-name {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      color: #fff;
    }

    .panel-lite .panel-cta {
      border-color: rgba(255,255,255,0.6);
      color: #fff;
    }

    .panel-lite .panel-cta:hover {
      background: #fff;
      color: #1a1a1a;
      border-color: #fff;
    }

    .panel-lite .panel-divider {
      right: 0;
      background: linear-gradient(180deg, transparent, rgba(255,255,255,0.3), transparent);
    }

    /* ==================== ELITE ==================== */
    .panel-elite {
      background: #0a0a0a;
      color: #f5f5f3;
      font-family: 'Cormorant Garamond', serif;
    }

    .panel-elite .panel-tint {
      background: #d4c5a9;
    }

    .panel-elite .panel-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      color: #d4c5a9;
      font-size: clamp(2.25rem, 4.5vw, 4rem);
    }

    .panel-elite .panel-icon {
      stroke: #d4c5a9;
    }

    .panel-elite .panel-cta {
      border-color: rgba(212, 197, 169, 0.6);
      color: #d4c5a9;
    }

    .panel-elite .panel-cta:hover {
      background: #d4c5a9;
      color: #050505;
      border-color: #d4c5a9;
    }

    /* ==================== DRIVE ==================== */
    .panel-drive {
      background: #0a0a0a;
      color: #e8ece8;
      font-family: 'Inter', sans-serif;
    }

    .panel-drive .panel-tint {
      background: #7a9a7a;
    }

    .panel-drive .panel-name {
      font-family: 'Inter', sans-serif;
      font-weight: 200;
      letter-spacing: 0.2em;
      color: #fff;
    }

    .panel-drive .panel-icon {
      stroke: #7a9a7a;
    }

    .panel-drive .panel-cta {
      border-color: rgba(255,255,255,0.6);
      color: #fff;
    }

    .panel-drive .panel-cta:hover {
      background: #fff;
      color: #0a0f0a;
      border-color: #fff;
    }

    .panel-drive .panel-divider {
      left: 0;
      background: linear-gradient(180deg, transparent, rgba(255,255,255,0.3), transparent);
    }

    /* Work in Progress panels */
    .panel-wip {
      cursor: default;
    }

    .panel-wip .panel-cover {
      opacity: 1;
      background: rgba(0, 0, 0, 0.85);
    }

    .panel-wip:hover .panel-cover,
    .panel-wip.expanded .panel-cover {
      opacity: 0.65;
    }

    .panel-wip .panel-video video {
      filter: grayscale(0.6);
    }

    .panel-wip .panel-cta {
      border-color: rgba(255,255,255,0.2);
      font-style: italic;
      letter-spacing: 0.15em;
    }

    .panel-wip:hover .panel-cta,
    .panel-wip.expanded .panel-cta {
      opacity: 0.35;
      transform: translateY(0);
    }

    /* Animations */
    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Footer Hint */
    .hint {
      position: fixed;
      bottom: 2rem;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 100;
      font-family: 'Inter', sans-serif;
      font-size: 0.5625rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #666;
      pointer-events: none;
      opacity: 0;
      animation: fadeUp 0.8s 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .logo-header {
        padding: 1.5rem 1rem;
      }

      .logo-text {
        font-size: 0.75rem;
      }

      .panels {
        flex-direction: column;
      }

      .panel {
        height: 33.333vh;
        min-height: 180px;
      }

      .panel:hover,
      .panel.expanded {
        flex: 2;
      }

      .panel-content {
        padding: 1rem;
      }

      .panel-icon {
        width: 32px;
        height: 32px;
        margin-bottom: 1rem;
      }

      .panel-name {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
      }

      .panel-tagline {
        font-size: 0.5625rem;
        margin-bottom: 1.5rem;
      }

      .panel-cta {
        opacity: 0.5;
        transform: translateY(0);
        padding: 0.75rem 1.25rem;
        font-size: 0.5625rem;
      }

      .panel-divider {
        display: none;
      }

      .hint {
        bottom: 1rem;
        font-size: 0.5rem;
      }
    }

    @media (max-width: 480px) {
      .logo-star {
        width: 18px;
        height: 18px;
      }

      .logo-text {
        font-size: 0.625rem;
        letter-spacing: 0.25em;
      }

      .logo-tagline {
        display: none;
      }
    }
  </style>
</head>
<body>
  <!-- Floating Logo -->
  <header class="logo-header">
    <div class="logo">
      <span class="logo-text">Amaris Experience</span>
      <span class="logo-tagline">Scegli la Tua Esperienza</span>
    </div>
  </header>

  <!-- Three Panels -->
  <div class="panels">
    <a href="lite/" class="panel panel-lite">
      <div class="panel-video">
        <video autoplay muted loop playsinline>
          <source src="https://videos.pexels.com/video-files/4115690/4115690-uhd_2560_1440_25fps.mp4" type="video/mp4">
        </video>
      </div>
      <div class="panel-cover"></div>
      <div class="panel-tint"></div>
      <div class="panel-content">
        <div class="panel-icon">
          <svg viewBox="0 0 48 48">
            <path d="M4 34C8 30 12 34 16 30S24 34 28 30S36 34 40 30" />
            <path d="M4 38C8 34 12 38 16 34S24 38 28 34S36 38 40 34" />
            <path d="M20 26L22 20L28 18L30 14L32 14L30 18L32 20L28 22L26 26Z" />
            <path d="M24 22C22 22 20 24 20 26" />
          </svg>
        </div>
        <h2 class="panel-name">Noleggio</h2>
        <p class="panel-tagline">Moto d'Acqua Senza Patente</p>
        <span class="panel-cta">
          Scopri
          <svg class="panel-cta-arrow" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M3 8H13M13 8L9 4M13 8L9 12"/>
          </svg>
        </span>
      </div>
      <div class="panel-divider"></div>
    </a>

    <div class="panel panel-elite panel-wip">
      <div class="panel-video">
        <video autoplay muted loop playsinline>
          <source src="https://videos.pexels.com/video-files/4822353/4822353-hd_1280_720_30fps.mp4" type="video/mp4">
        </video>
      </div>
      <div class="panel-cover"></div>
      <div class="panel-tint"></div>
      <div class="panel-content">
        <div class="panel-icon">
          <svg viewBox="0 0 48 48">
            <path d="M10 28C10 20.268 16.268 14 24 14S38 20.268 38 28" />
            <line x1="24" y1="10" x2="24" y2="14" />
            <line x1="12" y1="16" x2="14.5" y2="18.5" />
            <line x1="36" y1="16" x2="33.5" y2="18.5" />
            <line x1="8" y1="28" x2="12" y2="28" />
            <line x1="36" y1="28" x2="40" y2="28" />
            <path d="M4 32C8 28 12 32 16 28S24 32 28 28S36 32 40 28" />
            <path d="M4 36C8 32 12 36 16 32S24 36 28 32S36 36 40 32" />
            <path d="M22 24L24 22L26 24" />
          </svg>
        </div>
        <h2 class="panel-name">Esperienza</h2>
        <p class="panel-tagline">Celebra i Momenti Migliori</p>
        <span class="panel-cta">
          Prossimamente
        </span>
      </div>
    </div>

    <div class="panel panel-drive panel-wip">
      <div class="panel-video">
        <video autoplay muted loop playsinline>
          <source src="https://videos.pexels.com/video-files/6981328/6981328-hd_1920_1080_25fps.mp4" type="video/mp4">
        </video>
      </div>
      <div class="panel-cover"></div>
      <div class="panel-tint"></div>
      <div class="panel-content">
        <div class="panel-icon">
          <svg viewBox="0 0 48 48">
            <circle cx="24" cy="22" r="14" />
            <circle cx="24" cy="22" r="2" />
            <polygon points="24,10 21,20 24,18 27,20" />
            <polygon points="24,34 27,24 24,26 21,24" />
            <polygon points="12,22 22,25 20,22 22,19" />
            <polygon points="36,22 26,19 28,22 26,25" />
            <path d="M4 40C8 36 12 40 16 36S24 40 28 36S36 40 40 36" />
            <path d="M4 44C8 40 12 44 16 40S24 44 28 40S36 44 40 40" />
          </svg>
        </div>
        <h2 class="panel-name">Tour</h2>
        <p class="panel-tagline">Esplora la Costa del Conero</p>
        <span class="panel-cta">
          Prossimamente
        </span>
      </div>
      <div class="panel-divider"></div>
    </div>
  </div>

  <!-- Hint -->
  <p class="hint">&copy; 2026 Amaris Experience</p>

  <script>
    (function() {
      var isTouch = 'ontouchstart' in window;
      if (!isTouch) return;

      var panels = document.querySelectorAll('.panel');

      panels.forEach(function(panel) {
        panel.addEventListener('click', function(e) {
          if (panel.classList.contains('panel-wip')) {
            e.preventDefault();
            panels.forEach(function(p) { p.classList.remove('expanded'); });
            panel.classList.add('expanded');
            return;
          }
          if (panel.classList.contains('expanded')) return;
          e.preventDefault();
          panels.forEach(function(p) { p.classList.remove('expanded'); });
          panel.classList.add('expanded');
        });
      });
    })();
  </script>
</body>
</html>
